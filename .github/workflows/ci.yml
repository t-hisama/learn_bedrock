name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  frontend:
    name: Frontend Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  backend-and-infra:
    name: Backend / Infra Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: backend/lambda
        run: npm ci

      - name: Install infra dependencies
        working-directory: infra/cdk
        run: npm ci

      - name: Type check (CDK)
        working-directory: infra/cdk
        run: npx tsc --noEmit

      - name: CDK tests
        working-directory: infra/cdk
        run: npm test -- --ci

      - name: Create frontend build placeholder (FrontendStack asset解決用)
        run: mkdir -p frontend/out

      - name: CDK synth
        working-directory: infra/cdk
        run: npx cdk synth
        env:
          CDK_DEFAULT_ACCOUNT: '123456789012'
          CDK_DEFAULT_REGION: 'ap-northeast-1'