name: Security Scan

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    # 毎週月曜 9:00 JST (0:00 UTC) に定期スキャン
    - cron: '0 0 * * 1'

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Audit frontend dependencies
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=high

      - name: Audit backend dependencies
        working-directory: backend/lambda
        run: |
          npm ci
          npm audit --audit-level=high

      - name: Audit CDK dependencies
        working-directory: infra/cdk
        run: |
          npm ci
          npm audit --audit-level=high

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/typescript
            p/aws-lambda
            p/javascript
          generateSarif: '1'

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  iac-scan:
    name: IaC Security Scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install CDK dependencies
        working-directory: infra/cdk
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend/lambda
        run: npm ci

      - name: Create frontend build placeholder (FrontendStack asset解決用)
        run: mkdir -p frontend/out

      - name: CDK synth (CloudFormationテンプレート生成)
        working-directory: infra/cdk
        run: npx cdk synth --output ./cdk.out
        env:
          CDK_DEFAULT_ACCOUNT: '123456789012'
          CDK_DEFAULT_REGION: 'ap-northeast-1'

      - name: Run Trivy IaC scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: infra/cdk/cdk.out
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  secret-scan:
    name: Secret Detection (TruffleHog)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 全コミット履歴をスキャン

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: HEAD
          extra_args: --only-verified
